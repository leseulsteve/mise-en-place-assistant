            - recipe
            - meal
    quantity:
      default: 0
      selector:
        number:
          min: 0
          step: any
          mode: box
    location:
      selector:
        text:
    location_id:
      selector:
        text:
    sublocation:
      selector:
        text:

fill_container:
  fields:
    tag_id:
      required: true
      selector:
        text:
    quantity:
      required: true
      selector:
        number:
          min: 0.000001
          step: any
          mode: box

remove_items:
  fields:
    tag_id:
      required: true
      selector:
        text:
    quantity:
      required: true
      selector:
        number:
          min: 0.000001
          step: any
          mode: box

scan_container:
  fields:
    tag_id:
      required: true
      selector:
        text:
    quantity:
      selector:
        number:
          min: 0
          step: any
          mode: box
    mode:
      default: set
      selector:
        select:
          options:
            - set
            - add
            - remove

add_to_shopping_list:
  description: Add one explicit item to the preferred shopping list; Grocy-backed products can be sent to Grocy, while KitchenOwl remains supported for users who prefer it.
  fields:
    name:
      description: Free-text item name, or fallback label when item_id is supplied.
      selector:
        text:
    description:
      selector:
        text:
    item_id:
      description: Optional catalog product ID. Grocy-backed products preserve product identity in Grocy shopping lists.
      selector:
        text:
    quantity:
      default: 1
      selector:
        number:
          min: 0.000001
          step: any
          mode: box

add_empty_containers_to_shopping_list:
  description: Add unique product labels from empty containers to the preferred shopping list, preserving Grocy product identity where possible and including container, unit, location, and reason details in provider notes.
  fields: {}

add_missing_products_to_shopping_list:
  description: Ask Grocy to add products below their configured minimum stock to Grocy's shopping list.
  fields: {}

update_product_metadata:
  description: Store Home Assistant-owned Mise workflow metadata for a Grocy or DEV-mode mocked product.
  fields:
    item_id:
      required: true
      description: Catalog product ID from the configured provider.
      selector:
        text:
    container_policy:
      required: true
      description: How this product is normally handled by Mise container workflows.
      selector:
        select:
          options:
            - container
            - original_packaging
            - either
            - no_container
            - unknown
    storage_behavior:
      required: true
      description: Mise storage expectation for review and filtering; Grocy remains the storage-location source.
      selector:
        select:
          options:
            - fridge
            - freezer
            - pantry
            - dry_storage
            - cellar
            - counter
            - unknown
    meal_role:
      required: true
      description: How this product should appear in Mise meal-planning workflows.
      selector:
        select:
          options:
            - ingredient
            - staple
            - condiment
            - prepared_component
            - ignore
            - unknown
    available_in_mealie:
      required: true
      description: Whether Mise should sync this Grocy product into Mealie Foods for recipe ingredient selection.
      selector:
        boolean:
