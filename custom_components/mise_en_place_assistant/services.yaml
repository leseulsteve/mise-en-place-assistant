  description: Assemble selected complete TV dinner meals, consume one portion from each source component, and create ready-meal containers in the fridge.
  fields:
    meals:
      required: true
      selector:
        object:

fill_container:
  fields:
    tag_id:
      required: true
      selector:
        text:
    quantity:
      required: true
      selector:
        number:
          min: 0.000001
          step: any
          mode: box

remove_items:
  fields:
    tag_id:
      required: true
      selector:
        text:
    quantity:
      required: true
      selector:
        number:
          min: 0.000001
          step: any
          mode: box

scan_container:
  fields:
    tag_id:
      required: true
      selector:
        text:
    quantity:
      selector:
        number:
          min: 0
          step: any
          mode: box
    mode:
      default: set
      selector:
        select:
          options:
            - set
            - add
            - remove

add_to_shopping_list:
  description: Add one explicit item to the preferred shopping list; Grocy-backed products can be sent to Grocy, while KitchenOwl remains supported for users who prefer it.
  fields:
    name:
      description: Free-text item name, or fallback label when item_id is supplied.
      selector:
        text:
    description:
      selector:
        text:
    item_id:
      description: Optional catalog product ID. Grocy-backed products preserve product identity in Grocy shopping lists.
      selector:
        text:
    quantity:
      default: 1
      selector:
        number:
          min: 0.000001
          step: any
          mode: box

add_empty_containers_to_shopping_list:
  description: Add unique product labels from empty containers to the preferred shopping list, preserving Grocy product identity where possible and including container, unit, location, and reason details in provider notes.
  fields: {}

add_missing_products_to_shopping_list:
  description: Ask Grocy to add products below their configured minimum stock to Grocy's shopping list.
  fields: {}

update_product_metadata:
  description: Store Home Assistant-owned Mise workflow metadata for a Grocy or DEV-mode mocked product.
  fields:
    item_id:
      required: true
      description: Catalog product ID from the configured provider.
      selector:
        text:
    container_policy:
      required: true
      description: How this product is normally handled by Mise container workflows.
      selector:
        select:
          options:
            - container
            - original_packaging
            - either
            - no_container
            - unknown
    storage_behavior:
      required: true
      description: Mise storage expectation for review and filtering; Grocy remains the storage-location source.
      selector:
        select:
          options:
            - fridge
            - freezer
            - pantry
            - dry_storage
            - cellar
            - counter
            - unknown
    meal_role:
      required: true
      description: How this product should appear in Mise meal-planning workflows.
      selector:
        select:
          options:
            - ingredient
            - staple
            - condiment
            - prepared_component
            - ignore
            - unknown
    meal_component_role:
      description: Complete-meal slot this product can fill; eligible items must be tracked in portion-style units.
      selector:
        select:
          options:
            - veggie
            - starch
            - protein
            - ignore
            - unknown
    meal_component_family:
      description: Diversity family for complete-meal planning, such as poultry, rice, or leafy_green.
      selector:
        select:
          options:
            - leafy_green
            - cruciferous
            - root
            - squash
            - legume
            - mixed_vegetable
            - rice
            - pasta
            - potato
            - bread
            - grain
            - noodle
            - corn
            - poultry
            - red_meat
            - fish
            - seafood
            - vegetarian
            - pork
            - egg
            - dairy
            - unknown
    meal_component_detail:
      description: Specific diversity detail, such as chicken, salmon, broccoli, or basmati_rice.
      selector:
        text:
    available_in_mealie:
      required: true
      description: Whether Mise should sync this Grocy product into Mealie Foods for recipe ingredient selection.
      selector:
        boolean:

plan_complete_meals:
  description: Preview complete meals from available portion-counted inventory without moving or consuming inventory.
  fields:
    meal_count:
      default: 1
      selector:
        number:
          min: 1
          step: 1
          mode: box

create_prep_session:
  description: Store meal-prep session details after Home Assistant calendar scheduling succeeds.
  fields:
    calendar_entity_id:
      required: true
      selector:
        entity:
          domain: calendar
    start_date_time:
      required: true
      selector:
        text:
    end_date_time:
      required: true
      selector:
        text:
    recipe_ids:
      selector:
        object:
    recipe_quantities:
      description: Mapping of recipe ID to selected recipe quantity for the prep day.
      selector:
        object:
    name:
      description: Optional calendar summary; defaults to Meal prep.
      selector:
        text:
    description:
      selector:
        text:
