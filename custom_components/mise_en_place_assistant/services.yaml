create_location:
  description: Create a mocked/local storage location; live Grocy storage locations are still created in Grocy.
  fields:
    name:
      required: true
      selector:
        text:
    location_type:
      selector:
        select:
          options:
            - fridge
            - freezer
            - pantry
            - dry_storage
            - cellar
            - counter
            - other
    sublocations:
      description: Optional shelf, drawer, or bin names inside this storage location.
      selector:
        object:
    area_id:
      selector:
        text:
    sensors:
      description: Mapping of temperature, humidity, door, power, energy, or power_switch roles to Home Assistant entity IDs.
      selector:
        object:
    monitoring:
      description: Optional thresholds such as temperature_min, temperature_max, and power_required.
      selector:
        object:

update_location:
  description: Add or update Home Assistant monitoring metadata for a Grocy storage location.
  fields:
    location_id:
      required: true
      selector:
        text:
    name:
      required: true
      selector:
        text:
    location_type:
      selector:
        select:
          options:
            - fridge
            - freezer
            - pantry
            - dry_storage
            - cellar
            - counter
            - other
    sublocations:
      description: Optional shelf, drawer, or bin names inside this storage location.
      selector:
        object:
    area_id:
      selector:
        text:
    sensors:
      selector:
        object:
    monitoring:
      selector:
        object:

delete_location:
  description: Remove local monitoring metadata for a Grocy storage location; the Grocy location remains.
  fields:
    location_id:
      required: true
      selector:
        text:

move_container:
  fields:
    tag_id:
      required: true
      selector:
        text:
    location_id:
      required: true
      selector:
        text:
    sublocation:
      selector:
        text:

clear_container:
  description: Empty a live container while preserving its NFC identity and product attribution.
  fields:
    tag_id:
      required: true
      selector:
        text:

archive_container:
  description: Retire an empty container from active inventory without deleting its history.
  fields:
    tag_id:
      required: true
      selector:
        text:

restore_container:
  description: Return an archived container to active inventory.
  fields:
    tag_id:
      required: true
      selector:
        text:

simulate_crud:
  description: DEV-mode only exercise of mocked/local location and container CRUD paths.

create_container:
  fields:
    tag_id:
      required: true
      selector:
        text:
    name:
      selector:
        text:
    quantity:
      default: 0
      selector:
        number:
          min: 0
          step: any
          mode: box
    location:
      selector:
        text:
    location_id:
      selector:
        text:
    sublocation:
      selector:
        text:
    item_id:
      required: true
      selector:
        text:
    best_before_date:
      description: Optional Grocy best-before date for the added stock, formatted as YYYY-MM-DD.
      selector:
        text:
    purchased_date:
      description: Optional Grocy purchase date for the added stock, formatted as YYYY-MM-DD.
      selector:
        text:
    opened_date:
      description: Optional Grocy opened date for the added stock, formatted as YYYY-MM-DD.
      selector:
        text:
    price:
      description: Optional Grocy stock price for this purchase/addition.
      selector:
        number:
          min: 0
          step: any
          mode: box

